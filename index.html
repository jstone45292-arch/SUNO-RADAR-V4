<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SUNO Radar V4</title>

<style>

body{
  margin:0;
  background:#121212;
  color:white;
  font-family:Arial;
}

header{
  padding:20px;
  background:#1e1e1e;
  font-size:32px;
  font-weight:bold;
}

#tracks{
  padding:20px;
}

.card{
  background:#222;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
}

.title{
  font-size:20px;
  font-weight:bold;
}

.friend{
  color:#aaa;
  margin-top:5px;
}

.listen{
  display:inline-block;
  margin-top:10px;
  padding:8px 15px;
  background:#ff6b00;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

</style>

</head>

<body>

<header>
🎵 SUNO Radar V4
</header>

<div id="tracks">
로딩중...
</div>

<script>

fetch("/tracks")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(track=>{

html += `

<div class="card">

<div class="title">
${track.title}
</div>

<div class="friend">
👤 ${track.friend_name}
</div>

<div>
${track.group_name}
</div>

<a
class="listen"
target="_blank"
href="${track.track_url}">
듣기
</a>

</div>

`;

});

document.getElementById("tracks").innerHTML = html;

});

</script>

</body>
</html>
